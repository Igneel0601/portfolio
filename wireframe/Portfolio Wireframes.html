<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Portfolio · Wireframes</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Kalam:wght@300;400;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f5f0e6;
    --paper-2:#ede6d6;
    --ink:#1f1d1a;
    --ink-soft:#5a564e;
    --rule:#1f1d1a;
    --accent:#d24a2a;
    --accent-2:#2a6fdb;
    --highlight:#fff39a;
  }
  body[data-theme="dark"]{
    --paper:#0e1116;
    --paper-2:#161b22;
    --ink:#e6edf3;
    --ink-soft:#8b949e;
    --rule:#e6edf3;
    --accent:#6ee7a7;
    --accent-2:#7fb3ff;
    --highlight:#3a4a25;
  }
  html,body{background:#e7e1d3;margin:0;font-family:"Kalam",system-ui,sans-serif;color:var(--ink);transition:background .2s;}
  body[data-theme="dark"]{background:#0a0c10;}
  /* sketchy primitives reusable across wireframes */
  .wf{position:relative;width:100%;height:100%;background:var(--paper);color:var(--ink);font-family:"Kalam",sans-serif;overflow:hidden;}
  .wf *{box-sizing:border-box;}
  .wf .grid-bg{position:absolute;inset:0;background-image:
      linear-gradient(color-mix(in oklab,var(--ink) 6%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in oklab,var(--ink) 6%,transparent) 1px,transparent 1px);
    background-size:32px 32px;pointer-events:none;}
  .ink{color:var(--ink);} .mute{color:var(--ink-soft);}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace;}
  .hand{font-family:"Caveat","Kalam",cursive;}
  .serif{font-family:"Fraunces",serif;}
  .scribble{font-family:"Caveat",cursive;color:var(--accent);}
  .box{border:1.5px solid var(--ink);border-radius:6px;}
  .box-dash{border:1.5px dashed var(--ink);border-radius:6px;}
  .box-wob{border:1.8px solid var(--ink);border-radius:14px 8px 16px 6px / 8px 14px 6px 16px;}
  .img-ph{position:relative;color:var(--ink-soft);background:
      repeating-linear-gradient(135deg,transparent 0 10px,color-mix(in oklab,var(--ink) 14%,transparent) 10px 11px);
    border:1.5px solid var(--ink);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:4px;}
  .img-ph > *{color:var(--ink-soft);}
  .img-ph::before,.img-ph::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;}
  .img-ph::before{background:linear-gradient(45deg,transparent 49.4%,var(--ink) 49.4% 50.6%,transparent 50.6%);opacity:.18;}
  .img-ph::after{background:linear-gradient(-45deg,transparent 49.4%,var(--ink) 49.4% 50.6%,transparent 50.6%);opacity:.18;}
  .line{height:8px;background:repeating-linear-gradient(90deg,var(--ink) 0 18px,transparent 18px 22px);border-radius:4px;opacity:.75;}
  .line.short{width:55%;} .line.tiny{width:30%;height:6px;}
  .wavy{height:6px;background:
    radial-gradient(circle at 4px 6px,var(--ink) 1.4px,transparent 2px) 0 0/8px 6px repeat-x;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1.4px solid var(--ink);border-radius:999px;font-size:12px;font-family:"IBM Plex Mono",monospace;background:var(--paper);}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1.6px solid var(--ink);border-radius:8px;background:var(--paper);font-family:"IBM Plex Mono",monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;box-shadow:3px 3px 0 var(--ink);}
  .btn.solid{background:var(--ink);color:var(--paper);}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--ink);}
  .annot{position:absolute;font-family:"Caveat",cursive;color:var(--accent);font-size:18px;line-height:1;white-space:nowrap;}
  .annot.b{color:var(--accent-2);}
  .arrow{position:absolute;color:var(--accent);font-family:"Caveat",cursive;}
  .stamp{display:inline-block;padding:4px 10px;border:1.6px solid var(--accent);color:var(--accent);font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;transform:rotate(-3deg);border-radius:4px;}
  .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1.5px dashed var(--ink);}
  .nav-bar .links{display:flex;gap:18px;font-family:"IBM Plex Mono",monospace;font-size:13px;}
  .hilite{background:linear-gradient(transparent 60%,var(--highlight) 60%);padding:0 2px;}
  .tick{display:inline-block;width:10px;height:10px;border:1.4px solid var(--ink);transform:rotate(45deg);margin-right:6px;vertical-align:middle;}
  .x-mark{display:inline-block;width:14px;height:14px;position:relative;}
  .x-mark::before,.x-mark::after{content:"";position:absolute;inset:0;background:var(--ink);border-radius:2px;}
  .x-mark::before{transform:rotate(45deg);height:2px;top:6px;}
  .x-mark::after{transform:rotate(-45deg);height:2px;top:6px;}
  /* squiggle underline */
  .squig{background-image:radial-gradient(circle,var(--accent) 1.2px,transparent 1.4px);background-size:6px 4px;background-repeat:repeat-x;background-position:0 100%;padding-bottom:6px;}
  /* slight rotations so it feels hand-placed */
  .skew-l{transform:rotate(-.6deg);} .skew-r{transform:rotate(.5deg);}
</style>
</head>
<body>

<div id="canvas-root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

</html>
